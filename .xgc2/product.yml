schema: xgc2.product.v1
id: libxgc2-adapter-runtime-client-dev
name: XGC2 Adapter Runtime C++ SDK
version: 0.6.0-5
kind: toolchain-apt
summary: Generic C++ SDK for capability-first XGC2 AdapterRuntimeLink sessions, generated
  protocol bindings, fencing, dispatch, and flow control.
apt:
  distribution: focal,jammy,noble
  install:
  - libxgc2-adapter-runtime-client-dev
  packages:
  - libxgc2-adapter-runtime-client2
  - libxgc2-adapter-runtime-client-dev
  depends:
  - xgc2-protobuf-dev
  - libgrpc++-dev
  - libprotobuf-dev
usage:
  install: 'sudo apt update

    sudo apt install libxgc2-adapter-runtime-client-dev

    '
  smoke_test: 'pkg-config --modversion xgc2-adapter-runtime-client

    '
  notes: 'CMake consumers use find_package(xgc2_adapter_runtime_client REQUIRED CONFIG)

    and link xgc2::adapter_runtime_client. The package exports generated Runtime

    Link protobuf C++ headers and xgc2::adapter_runtime_protocol. The -dev

    package preserves the existing build interface and pulls the separate

    libxgc2-adapter-runtime-client2 SONAME package. Runtime applications depend

    only on that ABI package and its generated shlibs dependencies.

    '
ownership:
  paths:
  - /usr/include/xgc2/adapter_runtime
  - /usr/include/xgc
  - /usr/lib/*/libxgc2_adapter_runtime_client.so.2
  - /usr/lib/*/libxgc2_adapter_runtime_protocol.so.2
  - /usr/lib/*/libxgc2_adapter_runtime_client.so*
  - /usr/lib/*/libxgc2_adapter_runtime_protocol.so*
  - /usr/lib/*/cmake/xgc2_adapter_runtime_client
  - /usr/lib/*/pkgconfig/xgc2-adapter-runtime-client.pc
release:
  repository: lxk36/xgc2-adapter-runtime-client-cpp
  ref: main
  workflow: release.yml
  ci_workflow: ci.yml
  dependency_policy:
    xgc2-protobuf: rebuild
  apt_versions:
    focal: 0.6.0-5~focal
    jammy: 0.6.0-5~jammy
    noble: 0.6.0-5~noble
